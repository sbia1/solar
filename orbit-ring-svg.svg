<svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="arc-mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10E4A8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#30F0BC" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="arc-purple" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8040F0" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#9860F8" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="arc-teal" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#009C84" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#00C4A4" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10E4A8" stop-opacity=".06"/>
      <stop offset="100%" stop-color="#8040F0" stop-opacity=".06"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="glow-mint" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-core" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>

    <!-- Animations via animateTransform -->
  </defs>



  <!-- Ambient bloom -->
  <circle cx="160" cy="160" r="110" fill="#10E4A8" opacity=".018" filter="url(#glow-soft)"/>
  <circle cx="160" cy="160" r="90"  fill="#8040F0" opacity=".022" filter="url(#glow-soft)"/>

  <!-- ── OUTER ORBIT (R=132) spinning CW ── -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 160 160" to="360 160 160" dur="14s" repeatCount="indefinite"/>
    <!-- Main mint arc -->
    <path d="M160,28 A132,132 0 1,1 39.2,226" stroke="url(#arc-mint)" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <!-- Ghost arc -->
    <path d="M39.2,226 A132,132 0 0,1 160,28" stroke="rgba(30,44,66,0.35)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <!-- Tick marks -->
    <line x1="160" y1="28"  x2="160" y2="42"  stroke="#009C84" stroke-width="1.6" opacity=".55"/>
    <line x1="280" y1="108" x2="269" y2="114" stroke="#009C84" stroke-width="1.6" opacity=".45"/>
    <line x1="280" y1="212" x2="269" y2="206" stroke="#009C84" stroke-width="1.4" opacity=".4"/>
    <line x1="160" y1="292" x2="160" y2="278" stroke="#009C84" stroke-width="1.4" opacity=".4"/>
    <line x1="40"  y1="212" x2="51"  y2="206" stroke="#009C84" stroke-width="1.4" opacity=".35"/>
    <line x1="40"  y1="108" x2="51"  y2="114" stroke="#009C84" stroke-width="1.4" opacity=".35"/>
    <!-- Mint node -->
    <circle cx="160" cy="28" r="16" fill="#10E4A8" opacity=".06" filter="url(#glow-soft)"/>
    <circle cx="160" cy="28" r="7"  fill="#05070E" stroke="#10E4A8" stroke-width="2"/>
    <circle cx="160" cy="28" r="3"  fill="#10E4A8" filter="url(#glow-mint)">
      <animate attributeName="opacity" values=".7;1;.7" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ── MID ORBIT (R=100) spinning CCW ── -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 160 160" to="-360 160 160" dur="22s" repeatCount="indefinite"/>
    <circle cx="160" cy="160" r="100" stroke="rgba(36,50,72,0.25)" stroke-width="1" fill="none"/>
    <!-- Purple arc -->
    <path d="M160,60 A100,100 0 0,1 247,235" stroke="url(#arc-purple)" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- Teal arc -->
    <path d="M247,235 A100,100 0 0,1 73,235" stroke="url(#arc-teal)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Purple node -->
    <circle cx="160" cy="60" r="14" fill="#8040F0" opacity=".07" filter="url(#glow-soft)"/>
    <circle cx="160" cy="60" r="5.5" fill="#05070E" stroke="#8040F0" stroke-width="1.8"/>
    <circle cx="160" cy="60" r="2.2" fill="#8040F0" filter="url(#glow-purple)">
      <animate attributeName="opacity" values=".7;1;.7" dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ── INNER DASHED RING (R=68) spinning CW slow ── -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 160 160" to="360 160 160" dur="9s" repeatCount="indefinite"/>
    <circle cx="160" cy="160" r="68" stroke="rgba(16,228,168,0.13)" stroke-width="1" fill="none" stroke-dasharray="3 9"/>
  </g>

  <!-- ── STATIC RINGS ── -->
  <circle cx="160" cy="160" r="48" stroke="rgba(16,228,168,0.18)" stroke-width="1" fill="none"/>
  <circle cx="160" cy="160" r="34" stroke="rgba(128,64,240,0.12)" stroke-width=".8" fill="none"/>

  <!-- ── HEXAGON ── -->
  <polygon points="160,140 178,150 178,170 160,180 142,170 142,150"
    stroke="rgba(16,228,168,0.2)" stroke-width="1" fill="url(#hex-fill)"/>

  <!-- ── CORE ── -->
  <circle cx="160" cy="160" r="14"  fill="#10E4A8" opacity=".09" filter="url(#glow-soft)"/>
  <circle cx="160" cy="160" r="8.5" fill="#05070E" stroke="rgba(16,228,168,0.35)" stroke-width="1.2"/>
  <circle cx="160" cy="160" r="6"   fill="#10E4A8" opacity=".9" filter="url(#glow-core)">
    <animate attributeName="r"       values="6;7.5;6"   dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".55;1;.55"  dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="160" r="2.5" fill="white" opacity=".9"/>

  <!-- ── PULSE RINGS ── -->
  <circle cx="160" cy="160" r="10" fill="none" stroke="#10E4A8" stroke-width="1" opacity="0">
    <animate attributeName="r"       values="10;48;10" dur="3.6s" begin="1s"   repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".5;0;.5"  dur="3.6s" begin="1s"   repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="160" r="10" fill="none" stroke="#8040F0" stroke-width="1" opacity="0">
    <animate attributeName="r"       values="10;40;10" dur="3.6s" begin="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".4;0;.4"  dur="3.6s" begin="2.8s" repeatCount="indefinite"/>
  </circle>
</svg>
